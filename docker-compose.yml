services:
  db:
    image: postgres:13
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Postgres123!
      POSTGRES_DB: roombooking_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    command: >
      bash wait-for-it.sh db:5432 -- python manage.py runserver 0.0.0.0:8001
    volumes:
      - .:/app
      - ./media:/app/media
    ports:
      - "8001:8001"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://postgres:Postgres123!@db:5432/roombooking_db

volumes:
  pgdata:
