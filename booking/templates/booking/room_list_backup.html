{% extends 'booking/base.html' %}

{% block title %}Available Rooms{% endblock %}

{% block content %}
<div class="container py-5">
    <h1 class="mb-4 text-center">Available Rooms</h1>
    <div class="row row-cols-1 row-cols-md-3 g-4">
        {% for room in rooms %}
        <div class="col">
            <div class="card h-100 shadow-sm">
                <img src="https://via.placeholder.com/400x200?text=Room+Image" class="card-img-top" alt="{{ room.name }}">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">{{ room.name }}</h5>
                    <p class="card-text">
                        Capacity: <strong>{{ room.capacity }}</strong> persons<br>
                        {{ room.description }}
                    </p>
                    <div class="mt-auto">
                        <a href="{% url 'room_detail' room.id %}" class="btn btn-primary w-100">View Details</a>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
