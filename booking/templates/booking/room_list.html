{% extends 'booking/base.html' %}

{% block title %}Available Rooms - RoomBooking{% endblock %}

{% block content %}
<h1 class="mb-4">Available Rooms</h1>

<div class="row row-cols-1 row-cols-md-3 g-4">
  {% for room in rooms %}
  <div class="col">
    <div class="card h-100 shadow-sm">
      <!-- You can replace src with the actual image, it's a stub now -->
      <img src="https://via.placeholder.com/400x200?text={{ room.name|urlencode }}"
           class="card-img-top" alt="Image of {{ room.name }}">
      <div class="card-body d-flex flex-column">
        <h5 class="card-title">{{ room.name }}</h5>
        <p class="card-text flex-grow-1">{{ room.description }}</p>
        <p class="card-text"><strong>Capacity:</strong> {{ room.capacity }} persons</p>
        <a href="{% url 'room_detail' room.id %}" class="btn btn-primary mt-auto">View Details</a>
      </div>
    </div>
  </div>
  {% endfor %}
</div>
{% endblock %}
