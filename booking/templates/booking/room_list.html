{% extends "booking/base.html" %}

{% block title %}All Rooms{% endblock %}

{% block content %}
<div class="container mt-5">
    <h2 class="text-center mb-4">Available Rooms</h2>
    <div class="row g-4">
        {% for room in rooms %}
        <div class="col-md-4">
            <div class="card shadow-sm rounded-3 h-100">
                <img src="{{ room.image.url|default_if_none:'/media/rooms/default.jpg' }}"
                     class="card-img-top" alt="{{ room.name }}">
                <div class="card-body d-flex flex-column justify-content-between">
                    <div>
                        <h5 class="card-title">{{ room.name }}</h5>
                        <p class="card-text">{{ room.description|truncatewords:20 }}</p>
                    </div>
                    <a href="{% url 'booking:room_detail' room.id %}" class="btn btn-primary mt-3">View Details</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
