{% extends 'booking/base.html' %}
{% load static %}
{% block title %}Available Rooms{% endblock %}

{% block content %}
<h1 class="mb-4 text-center">Available Rooms</h1>

<div class="row row-cols-1 row-cols-md-3 g-4">
  {% for room in rooms %}
  <div class="col">
    <div class="card h-100 shadow-sm border-0">
      <!-- Room Image -->
      <img src="{% static 'booking/images/room-placeholder.jpg' %}" class="card-img-top" alt="Room Image" style="height: 200px; object-fit: cover;">

      <div class="card-body d-flex flex-column">
        <h5 class="card-title">{{ room.name }}</h5>
        <p class="card-text mb-1"><strong>Capacity:</strong> {{ room.capacity }} persons</p>
        <p class="card-text">{{ room.description }}</p>
        <a href="{% url 'room_detail' room.id %}" class="btn btn-outline-primary mt-auto align-self-start">View Details</a>
      </div>
    </div>
  </div>
  {% endfor %}
</div>
{% endblock %}
