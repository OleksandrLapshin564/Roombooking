version: "3.9"

services:
  db:
    image: postgres:13
    container_name: roombooking-db-rest
    environment:
      POSTGRES_DB: roombooking_db_rest
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Postgres123!
    ports:
      - "5433:5432"
    volumes:
      - roombooking_db_data_rest:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile.rest.txt
    container_name: roombooking-web-rest
    command: python manage.py runserver 0.0.0.0:8002
    volumes:
      - .:/app
    ports:
      - "8002:8002"
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://postgres:Postgres123!@db:5432/roombooking_db_rest
      DEBUG: "True"

volumes:
  roombooking_db_data_rest:
